<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1A0A00"/>
  <!-- Bread dome (rounded top of loaf) -->
  <path d="M7 22 Q7 12 16 11 Q25 12 25 22 Z" fill="#F9A931"/>
  <!-- Bread base (flat bottom rectangle) -->
  <rect x="7" y="21" width="18" height="5" rx="1.5" fill="#D56900"/>
  <!-- Score marks baked into the bread top -->
  <path d="M12 15.5 L12 22 M16 13.5 L16 22 M20 15.5 L20 22"
        stroke="#1A0A00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small steam wisps above bread (suggests fresh baked) -->
  <path d="M12 10 Q12.5 8.5 12 7.5 M16 9.5 Q16.5 8 16 7 M20 10 Q20.5 8.5 20 7.5"
        stroke="#F9A931" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
