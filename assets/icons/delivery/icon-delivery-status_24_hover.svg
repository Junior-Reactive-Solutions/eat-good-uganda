<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Map grid outline (subtle background) -->
  <rect x="4" y="4" width="16" height="16" rx="2" stroke="#333333" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Route path (curved line connecting checkpoints) -->
  <path d="M 7 8 Q 10 7 13 9 Q 16 11 16 15" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkpoint 1 (start - warm filled) -->
  <circle cx="7" cy="8" r="1.8" fill="#FF6B35" stroke="none"/>

  <!-- Checkpoint 2 (mid - outline) -->
  <circle cx="13" cy="9" r="1.5" stroke="#333333" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkpoint 3 (end - warm outline) -->
  <circle cx="16" cy="15" r="1.8" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small accent dots on route -->
  <circle cx="10" cy="7.5" r="0.5" fill="#FF6B35" stroke="none" opacity="0.6"/>
  <circle cx="15" cy="12.5" r="0.5" fill="#FF6B35" stroke="none" opacity="0.6"/>

  <!-- Status direction indicator (small arrow at end) -->
  <path d="M 16 15 L 18 17 M 16 15 L 17.5 14" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
