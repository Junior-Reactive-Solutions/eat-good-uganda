  <path d="M 14.67 13.33 Q 15.33 14.67 16.00 16.00" stroke="#FF6B35" stroke-width="2.00" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom sand accumulation (warm) -->
  <path d="M 13.33 22.67 L 18.67 22.67 L 21.33 26.67 L 10.67 26.67 Z" fill="#FF6B35" stroke="none" opacity="0.6"/>
</svg>
