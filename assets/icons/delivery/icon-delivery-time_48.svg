<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer hourglass body (rounded top and bottom) -->
  <path d="M 14.00 6.00 L 34.00 6.00 Q 36.00 6.00 36.00 8.00 L 36.00 14.00 L 12.00 14.00 L 12.00 8.00 Q 12.00 6.00 14.00 6.00 Z" stroke="#333333" stroke-width="4.00" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom hourglass body (rounded) -->
  <path d="M 12.00 34.00 L 12.00 40.00 Q 12.00 42.00 14.00 42.00 L 34.00 42.00 Q 36.00 42.00 36.00 40.00 L 36.00 34.00 L 12.00 34.00 Z" stroke="#333333" stroke-width="4.00" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Middle neck (thin line) -->
  <line x1="24.00" y1="14.00" x2="24.00" y2="34.00" stroke="#333333" stroke-width="3.00" stroke-linecap="round"/>

  <!-- Top hourglass sand (warm accent) -->
  <path d="M 16.00 8.00 L 32.00 8.00 L 28.00 14.00 L 20.00 14.00 Z" fill="#FF6B35" stroke="none" opacity="0.8"/>

  <!-- Sand falling indicator (small arc) -->
  <path d="M 23.00 18.00 Q 24.00 20.00 25.00 22.00" stroke="#FF6B35" stroke-width="3.00" fill="none" stroke-linecap="round"/>
  <path d="M 22.00 20.00 Q 23.00 22.00 24.00 24.00" stroke="#FF6B35" stroke-width="3.00" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom sand accumulation (warm) -->
  <path d="M 20.00 34.00 L 28.00 34.00 L 32.00 40.00 L 16.00 40.00 Z" fill="#FF6B35" stroke="none" opacity="0.6"/>
</svg>
