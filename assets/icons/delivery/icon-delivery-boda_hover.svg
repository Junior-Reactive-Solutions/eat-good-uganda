<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left wheel (circle) -->
  <circle cx="8" cy="16" r="3.5" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right wheel (circle) -->
  <circle cx="18" cy="16" r="3.5" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Axle connecting wheels -->
