<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.4">
  <!-- Stack of boxes (3 levels) -->
  <g>
    <!-- Bottom box -->
    <rect x="5" y="15" width="8" height="6" rx="0.5" stroke="#CCCCCC" stroke-width="2.67" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Middle box -->
    <rect x="5" y="10" width="8" height="5" rx="0.5" stroke="#CCCCCC" stroke-width="2.67" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Top box -->
    <rect x="5" y="5" width="8" height="5" rx="0.5" stroke="#CCCCCC" stroke-width="2.67" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Receipt label (accent) -->
    <line x1="14" y1="6" x2="18" y2="6" stroke="#CCCCCC" stroke-width="2.00" stroke-linecap="round"/>
    <line x1="14" y1="9" x2="18" y2="9" stroke="#CCCCCC" stroke-width="2.00" stroke-linecap="round"/>
    <line x1="14" y1="12" x2="18" y2="12" stroke="#CCCCCC" stroke-width="2.00" stroke-linecap="round"/>
  </g>
</svg>
