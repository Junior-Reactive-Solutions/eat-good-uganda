<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.4">
  <!-- Outer circle frame -->
  <circle cx="12" cy="12" r="11" stroke="#CCCCCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phone body -->
  <rect x="9" y="7" width="6" height="10" rx="1" stroke="#CCCCCC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phone screen area (subtle indicator) -->
  <rect x="9.5" y="7.5" width="5" height="8" rx="0.5" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Money symbol (₦) - warm accent -->
  <text x="12" y="14.5" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#CCCCCC" stroke="none">₦</text>

  <!-- Small accent dot on phone frame -->
  <circle cx="12" cy="7.8" r="0.8" fill="#CCCCCC" stroke="none"/>
</svg>
