<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body (rounded rectangle) -->
  <rect x="8.5" y="5" width="7" height="14" rx="1.5" stroke="#FF6B35" stroke-width="2.67" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phone screen area (subtle inner frame) -->
  <rect x="9" y="5.5" width="6" height="12" rx="1" stroke="#FF6B35" stroke-width="2.00" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Tap waves (organic, 3 curved lines) -->
  <path d="M 7 12 Q 7 9 10 9" stroke="#FF6B35" stroke-width="2.40" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 5.5 12 Q 5.5 8 10 8" stroke="#FF6B35" stroke-width="2.40" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M 17 12 Q 17 9 14 9" stroke="#FF6B35" stroke-width="2.40" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 18.5 12 Q 18.5 8 14 8" stroke="#FF6B35" stroke-width="2.40" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Small dot indicator on phone (top right) -->
  <circle cx="14" cy="6.5" r="0.6" fill="#FF6B35" stroke="none"/>
</svg>
