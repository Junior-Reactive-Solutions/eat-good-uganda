  <!-- Left column with warm accent -->
  <rect x="8.67" y="14.67" width="2" height="7" rx="0.67" stroke="#FF6B35" stroke-width="2.67" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center column -->
