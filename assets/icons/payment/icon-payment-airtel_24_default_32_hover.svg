<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle frame -->
  <circle cx="12" cy="12" r="11" stroke="#333333" stroke-width="2.67" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Signal waves (curved arcs) representing Airtel's wireless nature -->
