  <path d="M 12 10 L 13.5 13" stroke="#FF6B35" stroke-width="2.00" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 15 13 L 16.5 10" stroke="#FF6B35" stroke-width="2.00" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crust texture (subtle curved lines) -->
  <path d="M 7.5 12 Q 8.5 11 9.5 12" stroke="#333333" stroke-width="1.33" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 14.5 12 Q 15.5 11 16.5 12" stroke="#333333" stroke-width="1.33" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
