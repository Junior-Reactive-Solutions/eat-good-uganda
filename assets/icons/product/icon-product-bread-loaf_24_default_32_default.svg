  <!-- Base of loaf -->
  <line x1="6.5" y1="16" x2="17.5" y2="16" stroke="#333333" stroke-width="2.67" stroke-linecap="round"/>

  <!-- Score lines (diagonal cuts on bread - warm accent) -->
