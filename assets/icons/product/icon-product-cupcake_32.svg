<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cupcake wrapper (trapezoid cup shape) -->
  <path d="M 8 13 L 7 20 Q 7 21 8.5 21.5 L 15.5 21.5 Q 17 21 17 20 L 16 13 Z" stroke="#333333" stroke-width="2.67" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Frosting swirl on top (wavy curve for frosting) -->
