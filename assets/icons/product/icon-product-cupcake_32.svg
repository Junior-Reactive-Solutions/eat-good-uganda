  <!-- Subtle wrapper texture -->
  <line x1="9" y1="15" x2="8.5" y2="20" stroke="#333333" stroke-width="1.33" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="15" x2="15.5" y2="20" stroke="#333333" stroke-width="1.33" stroke-linecap="round" opacity="0.5"/>
</svg>
