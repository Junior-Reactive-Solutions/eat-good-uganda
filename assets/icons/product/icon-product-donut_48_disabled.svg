<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.4">
  <!-- Donut outer ring -->
  <circle cx="12" cy="12" r="9" stroke="#CCCCCC" stroke-width="4.00" fill="none"/>

  <!-- Donut hole (inner ring) -->
  <circle cx="12" cy="12" r="5.5" stroke="#CCCCCC" stroke-width="4.00" fill="none"/>

  <!-- Glaze coating on top (wavy line) -->
  <path d="M 4 12 Q 4 6 12 4 Q 20 6 20 12" stroke="#CCCCCC" stroke-width="4.00" fill="none" stroke-linecap="round"/>

  <!-- Sprinkles on glaze (small vertical lines) -->
  <line x1="7" y1="8" x2="7" y2="4.5" stroke="#CCCCCC" stroke-width="2.00" stroke-linecap="round"/>
  <line x1="12" y1="5" x2="12" y2="1.5" stroke="#CCCCCC" stroke-width="2.00" stroke-linecap="round"/>
  <line x1="17" y1="8" x2="17" y2="4.5" stroke="#CCCCCC" stroke-width="2.00" stroke-linecap="round"/>

  <!-- Additional accent sprinkles -->
  <line x1="9.5" y1="6.5" x2="9.5" y2="3" stroke="#CCCCCC" stroke-width="1.60" stroke-linecap="round" opacity="0.7"/>
  <line x1="14.5" y1="6.5" x2="14.5" y2="3" stroke="#CCCCCC" stroke-width="1.60" stroke-linecap="round" opacity="0.7"/>
</svg>
